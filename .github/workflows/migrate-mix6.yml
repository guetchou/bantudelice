name: Migrate and verify Laravel Mix 6
on:
  pull_request:
    branches: [main]
permissions:
  actions: write
  contents: write
jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: '1'
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: chore/mix6-build-chain
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
      - name: Assert Node 20
        run: test "$(node -p "process.versions.node.split('.')[0]")" = "20"
      - name: Install exact dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Build and validate assets
        run: |
          npm run production
          node --check public/js/app.js
          cmp --silent resources/css/app.css public/css/app.css
          git diff --exit-code -- public/js/app.js public/css/app.css public/mix-manifest.json package-lock.json
      - name: Build validated production workflow
        run: |
          python3 scripts/patch_mix6_pipeline.py
          test "$(grep -Fc 'npm ci --ignore-scripts --no-audit --no-fund' .github/workflows/deploy.yml)" = "2"
          grep -Fq 'Build frontend non reproductible' .github/workflows/deploy.yml
          ! grep -Fq 'Build npm DÉSACTIVÉ TEMPORAIREMENT' .github/workflows/deploy.yml
          python3 -m pip install --quiet pyyaml
          python3 - <<'PY'
          import yaml
          with open('.github/workflows/deploy.yml', encoding='utf-8') as handle:
              yaml.safe_load(handle)
          print('deploy.yml YAML syntax OK')
          PY
      - name: Publish validated deploy workflow
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: patched-deploy-yml
          path: .github/workflows/deploy.yml
          retention-days: 7
      - id: push
        name: Attempt authenticated workflow update
        continue-on-error: true
        run: |
          set +e
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/deploy.yml
          git commit -m 'ci(frontend): restore blocking npm build in CI and deploy' > /tmp/workflow-push.log 2>&1
          COMMIT_CODE=$?
          if [ "$COMMIT_CODE" = "0" ]; then
            git push origin HEAD:chore/mix6-build-chain >> /tmp/workflow-push.log 2>&1
            PUSH_CODE=$?
          else
            PUSH_CODE=$COMMIT_CODE
          fi
          cat /tmp/workflow-push.log
          exit "$PUSH_CODE"
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: workflow-push-log
          path: /tmp/workflow-push.log
          retention-days: 7
      - if: steps.push.outcome != 'success'
        run: exit 1
