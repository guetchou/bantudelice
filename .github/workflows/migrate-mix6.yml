name: Migrate and verify Laravel Mix 6
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: '1'
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: chore/mix6-build-chain
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
      - name: Assert Node 20
        run: test "$(node -p "process.versions.node.split('.')[0]")" = "20"
      - name: Capture current generated assets
        run: |
          mkdir -p /tmp/assets-before
          cp public/js/app.js /tmp/assets-before/app.js
          cp public/css/app.css /tmp/assets-before/app.css
          cp public/mix-manifest.json /tmp/assets-before/mix-manifest.json
          sha256sum public/js/app.js public/css/app.css public/mix-manifest.json > /tmp/assets-before.sha256
          wc -c public/js/app.js public/css/app.css public/mix-manifest.json > /tmp/assets-before.sizes
      - name: Install exact dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Build production assets
        run: npm run production
      - name: Validate generated assets
        run: |
          test -s public/js/app.js
          test -s public/css/app.css
          test -s public/mix-manifest.json
          node --check public/js/app.js
          cmp --silent resources/css/app.css public/css/app.css
          grep -Fq 'fonts.googleapis.com/css2?family=Plus+Jakarta+Sans' public/css/app.css
          grep -Fq "../frontend/css/modern.css" public/css/app.css
          node - <<'NODE'
          const fs = require('fs');
          const postcss = require('postcss');
          const manifest = JSON.parse(fs.readFileSync('public/mix-manifest.json', 'utf8'));
          if (manifest['/js/app.js'] !== '/js/app.js') throw new Error('manifest JS invalide');
          if (manifest['/css/app.css'] !== '/css/app.css') throw new Error('manifest CSS invalide');
          postcss.parse(fs.readFileSync('public/css/app.css', 'utf8'));
          NODE
      - name: Restore blocking frontend build in production workflow
        run: |
          python3 scripts/patch_mix6_pipeline.py
          test "$(grep -Fc 'npm ci --ignore-scripts --no-audit --no-fund' .github/workflows/deploy.yml)" = "2"
          grep -Fq 'Build frontend non reproductible' .github/workflows/deploy.yml
          ! grep -Fq 'Build npm DÉSACTIVÉ TEMPORAIREMENT' .github/workflows/deploy.yml
          python3 -m pip install --quiet pyyaml
          python3 - <<'PY'
          import yaml
          with open('.github/workflows/deploy.yml', encoding='utf-8') as handle:
              yaml.safe_load(handle)
          print('deploy.yml YAML syntax OK')
          PY
      - name: Verify deterministic workspace
        run: |
          git diff --exit-code -- public/js/app.js public/css/app.css public/mix-manifest.json package-lock.json
          git diff --stat -- .github/workflows/deploy.yml
      - name: Publish validated deploy workflow
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: patched-deploy-yml
          path: .github/workflows/deploy.yml
          retention-days: 7
