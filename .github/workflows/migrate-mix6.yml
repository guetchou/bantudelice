name: Migrate and verify Laravel Mix 6
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: '1'
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: chore/mix6-build-chain
          fetch-depth: 0
      - uses: actions/setup-node@1e60f620b9541d0c243d4afc0317c29e95c00a47
        with:
          node-version: '20'
      - name: Capture current compiled assets
        run: |
          mkdir -p /tmp/assets-before
          cp public/js/app.js /tmp/assets-before/app.js
          cp public/css/app.css /tmp/assets-before/app.css
          cp mix-manifest.json /tmp/assets-before/mix-manifest.json
          sha256sum public/js/app.js public/css/app.css mix-manifest.json > /tmp/assets-before.sha256
          wc -c public/js/app.js public/css/app.css mix-manifest.json > /tmp/assets-before.sizes
      - name: Generate lockfile and install exact dependencies
        run: |
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          npm ci --ignore-scripts --no-audit --no-fund
      - name: Build production assets
        run: npm run production
      - name: Validate generated assets
        run: |
          test -s public/js/app.js
          test -s public/css/app.css
          test -s mix-manifest.json
          node --check public/js/app.js
          node - <<'NODE'
          const fs = require('fs');
          const postcss = require('postcss');
          const manifest = JSON.parse(fs.readFileSync('mix-manifest.json', 'utf8'));
          if (!manifest['/js/app.js'] || !manifest['/css/app.css']) {
            throw new Error('mix-manifest.json ne contient pas les deux assets attendus');
          }
          postcss.parse(fs.readFileSync('public/css/app.css', 'utf8'));
          NODE
      - name: Compare old and new outputs
        run: |
          {
            echo '# Laravel Mix 6 asset comparison'
            echo
            echo '## Before hashes'
            cat /tmp/assets-before.sha256
            echo
            echo '## After hashes'
            sha256sum public/js/app.js public/css/app.css mix-manifest.json
            echo
            echo '## Before sizes'
            cat /tmp/assets-before.sizes
            echo
            echo '## After sizes'
            wc -c public/js/app.js public/css/app.css mix-manifest.json
            echo
            echo '## Diff statistics'
            git diff --stat -- package-lock.json public/js/app.js public/css/app.css mix-manifest.json public/js/app.js.LICENSE.txt || true
          } | tee mix6-build-report.txt
      - name: Reject unexpected generated changes
        run: |
          UNEXPECTED=$(git status --short | awk '{print $2}' | grep -Ev '^(package-lock.json|public/js/app.js|public/css/app.css|mix-manifest.json|public/js/app.js.LICENSE.txt|mix6-build-report.txt)$' || true)
          if [ -n "$UNEXPECTED" ]; then
            echo 'Unexpected files changed:'
            echo "$UNEXPECTED"
            exit 1
          fi
      - name: Publish comparison report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: mix6-build-comparison
          path: mix6-build-report.txt
          retention-days: 7
      - name: Commit verified lockfile and assets
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json public/js/app.js public/css/app.css mix-manifest.json
          if [ -f public/js/app.js.LICENSE.txt ]; then git add public/js/app.js.LICENSE.txt; fi
          git diff --cached --quiet && exit 0
          git commit -m 'build(frontend): regenerate assets with Laravel Mix 6'
          git push origin HEAD:chore/mix6-build-chain
