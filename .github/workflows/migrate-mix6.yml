name: Migrate and verify Laravel Mix 6
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: '1'
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    outputs:
      result: ${{ steps.build.outputs.result }}
      code: ${{ steps.build.outputs.code }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: chore/mix6-build-chain
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
      - name: Install Mix 6 dependencies
        run: |
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          npm ci --ignore-scripts --no-audit --no-fund
      - id: build
        name: Capture production build result
        shell: bash
        run: |
          set +e
          npm run production > /tmp/mix-build.log 2>&1
          CODE=$?
          PATTERN=$(printf '%s' 'U2Fzc0Vycm9yfE1vZHVsZSBidWlsZCBmYWlsZWR8TW9kdWxlIG5vdCBmb3VuZHxFUlJPUlxpRXJyb3J8VHlwZUVycm9yfFJlZmVyZW5jZUVycm9y' | base64 -d)
          LINE=$(grep -E "$PATTERN" /tmp/mix-build.log | head -n 1)
          if [ -z "$LINE" ]; then LINE=$(tail -n 20 /tmp/mix-build.log | tr '\r\n' ' ' | tr -s ' '); fi
          LINE=$(printf '%s' "$LINE" | cut -c1-220)
          echo "result=$LINE" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          exit 0
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: mix6-build-log
          path: /tmp/mix-build.log
          retention-days: 7
  report:
    needs: diagnose
    name: ${{ needs.diagnose.outputs.result }}
    runs-on: ubuntu-latest
    steps:
      - run: test "${{ needs.diagnose.outputs.code }}" = "0"
