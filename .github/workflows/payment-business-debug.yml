name: Payment Business Debug

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  payment-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl, sqlite3, pdo_sqlite, bcmath, intl, zip, gd
          coverage: none
          tools: composer:v2
      - name: Prepare
        run: |
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs database
          touch database/testing.sqlite
          cp .env.example .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's|^DB_DATABASE=.*|DB_DATABASE=database/testing.sqlite|' .env
          composer install --no-interaction --prefer-dist
          php artisan key:generate
          php artisan migrate:fresh --force
      - name: Full test suite
        shell: bash
        run: |
          set -o pipefail
          php artisan test 2>&1 | tee payment-business-output.log
      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: payment-business-debug-output
          path: payment-business-output.log
          if-no-files-found: warn
          retention-days: 1
