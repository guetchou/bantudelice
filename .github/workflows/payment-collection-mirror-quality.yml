name: Payment Collection Mirror Quality

on:
  pull_request:
    paths:
      - 'app/Domain/Finance/Adapters/**'
      - 'app/Domain/Finance/Contracts/**'
      - 'app/Domain/Finance/Data/CollectedPayment.php'
      - 'app/Domain/Finance/Listeners/MirrorPaymentCollection.php'
      - 'app/Domain/Finance/Models/FinancialMirrorEvent.php'
      - 'app/Domain/Finance/Services/FinancialLedgerService.php'
      - 'app/Domain/Finance/Services/PaymentClearingAccountService.php'
      - 'app/Domain/Finance/Services/PaymentCollectionLedgerService.php'
      - 'app/Domain/Finance/Services/PaymentCollectionMirrorService.php'
      - 'app/Console/Commands/AuditFinancialCoreArchitecture.php'
      - 'app/Console/Commands/RetryPaymentCollectionMirrors.php'
      - 'app/Providers/FinanceMirrorServiceProvider.php'
      - 'config/app.php'
      - 'config/financial-mirror.php'
      - 'database/migrations/*financial_mirror_events*'
      - 'tests/Feature/PaymentCollectionMirrorTest.php'
      - 'docs/finance/payment-collection-mirror.md'
      - '.github/workflows/payment-collection-mirror-quality.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, bcmath, sqlite3, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Prepare test environment
        run: |
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/framework/testing storage/logs bootstrap/cache
          cp .env.example .env
          chmod -R 775 storage bootstrap/cache

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare application
        run: |
          php artisan key:generate
          php artisan optimize:clear

      - name: Validate PHP syntax
        run: |
          php -l app/Domain/Finance/Data/CollectedPayment.php
          php -l app/Domain/Finance/Listeners/MirrorPaymentCollection.php
          php -l app/Domain/Finance/Models/FinancialMirrorEvent.php
          php -l app/Domain/Finance/Services/PaymentClearingAccountService.php
          php -l app/Domain/Finance/Services/PaymentCollectionLedgerService.php
          php -l app/Domain/Finance/Services/PaymentCollectionMirrorService.php
          php -l app/Console/Commands/RetryPaymentCollectionMirrors.php
          php -l app/Providers/FinanceMirrorServiceProvider.php
          php -l config/app.php
          php -l config/financial-mirror.php
          php -l database/migrations/2026_06_30_231000_create_financial_mirror_events_table.php
          php -l tests/Feature/PaymentCollectionMirrorTest.php

      - name: Check financial migration ownership
        run: php artisan finance:audit-core-architecture

      - name: Run mirror tests
        run: php artisan test --filter=PaymentCollectionMirrorTest
