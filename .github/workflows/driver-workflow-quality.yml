name: Driver Workflow Quality

on:
  pull_request:
    paths:
      - 'app/**'
      - 'routes/api.php'
      - 'database/migrations/**'
      - 'resources/views/driver/**'
      - 'tests/Unit/DriverWorkflowSecurityTest.php'
      - '.github/workflows/driver-workflow-quality.yml'

permissions:
  contents: read

jobs:
  php-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json, tokenizer, fileinfo, openssl, pdo_sqlite, curl, dom, simplexml, xmlwriter, zip, gd, intl, bcmath
          coverage: none

      - name: Validate Composer metadata
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: Lint changed PHP files
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD" -- '*.php' > /tmp/changed-php.txt
          if [ ! -s /tmp/changed-php.txt ]; then
            echo 'No changed PHP files.'
            exit 0
          fi
          while IFS= read -r file; do
            [ -f "$file" ] || continue
            php -l "$file"
          done < /tmp/changed-php.txt

      - name: Run driver workflow regression tests
        run: vendor/bin/phpunit tests/Unit/DriverWorkflowSecurityTest.php
