name: Payment Kernel Debug

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  payment-rule:
    strategy:
      fail-fast: false
      matrix:
        test:
          - test_provider_statuses_are_normalized_without_hiding_unknowns
          - test_paid_payment_cannot_be_downgraded_directly_to_failed
          - test_multiple_confirmed_payments_fund_one_order_without_double_allocation
          - test_unmapped_provider_status_moves_unresolved_payment_to_unknown
    name: ${{ matrix.test }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl, sqlite3, pdo_sqlite, bcmath, intl, zip, gd
          coverage: none
          tools: composer:v2
      - name: Prepare application
        run: |
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs database
          touch database/testing.sqlite
          chmod -R 775 storage
          cat > .env <<'ENVEOF'
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=false
          APP_URL=http://localhost
          DB_CONNECTION=sqlite
          DB_DATABASE=database/testing.sqlite
          CACHE_DRIVER=array
          SESSION_DRIVER=array
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          BROADCAST_DRIVER=log
          GEPAY_REQUIRE_NONCE=false
          ENVEOF
          composer install --no-interaction --prefer-dist --optimize-autoloader >/dev/null
          php artisan key:generate --quiet
          php artisan passport:keys --force >/dev/null
          php artisan migrate:fresh --force --quiet
      - name: Run payment rule
        run: php artisan test --filter=${{ matrix.test }}
