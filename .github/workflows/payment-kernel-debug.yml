name: Payment Kernel Debug

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  payment-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl, sqlite3, pdo_sqlite, bcmath, intl, zip, gd
          coverage: none
          tools: composer:v2
      - name: Prepare application
        run: |
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs database
          touch database/testing.sqlite
          chmod -R 775 storage
          cat > .env <<'ENVEOF'
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=false
          APP_URL=http://localhost
          DB_CONNECTION=sqlite
          DB_DATABASE=database/testing.sqlite
          CACHE_DRIVER=array
          SESSION_DRIVER=array
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          BROADCAST_DRIVER=log
          GEPAY_REQUIRE_NONCE=false
          ENVEOF
          composer install --no-interaction --prefer-dist --optimize-autoloader >/dev/null
          php artisan key:generate --quiet
          php artisan passport:keys --force >/dev/null
          php artisan migrate:fresh --force --quiet
      - name: Run payment kernel tests
        shell: bash
        continue-on-error: true
        run: php artisan test --filter=PaymentBusinessKernelTest > payment-kernel-output.log 2>&1
      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: payment-kernel-output
          path: payment-kernel-output.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce test result
        run: grep -q 'FAILURES!' payment-kernel-output.log && exit 1 || true
