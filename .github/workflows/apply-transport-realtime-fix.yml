name: Apply Transport Realtime Fix
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: fix/realtime-geolocation-pipeline
          fetch-depth: 0
      - run: python3 scripts/ci/patch_transport_realtime.py
      - run: |
          grep -Fq "private-transport.booking." resources/views/booking_detail.blade.php
          grep -Fq "location.updated" resources/views/booking_detail.blade.php
          grep -Fq "transport.booking.presence.updated" resources/views/booking_detail.blade.php
          grep -Fq "transport.booking.status.updated" resources/views/booking_detail.blade.php
      - run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add resources/views/booking_detail.blade.php
          git commit -m 'fix(realtime): consume transport tracking events'
          git push origin HEAD:fix/realtime-geolocation-pipeline
