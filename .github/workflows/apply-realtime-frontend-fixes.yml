name: Apply Realtime Frontend Fixes

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: fix/realtime-geolocation-pipeline
          fetch-depth: 0

      - name: Apply Food realtime contract
        run: python3 scripts/ci/patch_food_realtime.py

      - name: Verify patched contract
        run: |
          grep -Fq "private-food.order." resources/views/frontend/track_order.blade.php
          grep -Fq "food.order.presence.updated" resources/views/frontend/track_order.blade.php
          grep -Fq "data.location" resources/views/frontend/track_order.blade.php
          ! grep -Fq "food.driver.location.updated" resources/views/frontend/track_order.blade.php

      - name: Commit verified view
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add resources/views/frontend/track_order.blade.php
          git diff --cached --quiet && exit 0
          git commit -m 'fix(realtime): align Food presence channel contract'
          git push origin HEAD:fix/realtime-geolocation-pipeline
