name: Integration page verification
on: [push, pull_request]
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: bantudelice_test
          MYSQL_ROOT_PASSWORD: root
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    outputs:
      result: ${{ steps.check.outputs.result }}
      code: ${{ steps.check.outputs.code }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: shivammathur/setup-php@cf4cade2721270509d5b1c766ab3549210a39a2a
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, mysqli, mbstring, xml, ctype, json, tokenizer, bcmath, openssl, fileinfo
          coverage: none
      - run: mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/framework/testing storage/logs
      - run: printf '%s\n' 'APP_ENV=testing' 'APP_KEY=' 'APP_URL=http://localhost' 'DB_CONNECTION=mysql' 'DB_HOST=127.0.0.1' 'DB_PORT=3306' 'DB_DATABASE=bantudelice_test' 'DB_USERNAME=root' 'DB_PASSWORD=root' 'CACHE_DRIVER=array' 'SESSION_DRIVER=array' 'QUEUE_CONNECTION=sync' 'MAIL_MAILER=array' 'BROADCAST_DRIVER=log' > .env
      - run: composer install --no-interaction --prefer-dist --optimize-autoloader --quiet
      - run: php artisan key:generate --ansi && php artisan passport:keys --force
      - id: check
        run: |
          set +e
          php artisan test tests/Feature/Food/CustomerOrderTimelinePageTest.php --stop-on-failure > /tmp/result.txt 2>&1
          C=$?
          L=$(grep -E 'Failed asserting|Expected response|Exception|Error|Call to|Undefined' /tmp/result.txt | head -n 1)
          if [ -z "$L" ]; then L=$(tail -n 12 /tmp/result.txt | tr '\r\n' ' ' | tr -s ' '); fi
          L=$(printf '%s' "$L" | cut -c1-220)
          echo "result=$L" >> "$GITHUB_OUTPUT"
          echo "code=$C" >> "$GITHUB_OUTPUT"
          exit 0
  report:
    needs: diagnose
    name: ${{ needs.diagnose.outputs.result }}
    runs-on: ubuntu-latest
    steps:
      - run: test "${{ needs.diagnose.outputs.code }}" = "0"
