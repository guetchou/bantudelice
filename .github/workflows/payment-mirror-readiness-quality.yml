name: Payment Mirror Readiness Quality

on:
  pull_request:
    paths:
      - 'app/Domain/Finance/Services/PaymentCollectionRouteResolver.php'
      - 'app/Domain/Finance/Services/PaymentCollectionPostingVerifier.php'
      - 'app/Domain/Finance/Services/PaymentCollectionReadinessAuditService.php'
      - 'app/Domain/Finance/Services/PaymentCollectionMirrorService.php'
      - 'app/Domain/Finance/Services/PaymentClearingAccountService.php'
      - 'app/Console/Commands/AuditPaymentCollectionReadiness.php'
      - 'tests/Feature/PaymentCollectionReadinessAuditTest.php'
      - 'tests/Feature/PaymentCollectionReadinessBlockersTest.php'
      - 'docs/finance/payment-mirror-readiness-audit.md'
      - '.github/workflows/payment-mirror-readiness-quality.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  readiness-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, bcmath, sqlite3, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Prepare test environment
        run: |
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/framework/testing storage/logs bootstrap/cache
          cp .env.example .env
          chmod -R 775 storage bootstrap/cache

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare application
        run: |
          php artisan key:generate
          php artisan optimize:clear

      - name: Validate PHP syntax
        run: |
          php -l app/Domain/Finance/Services/PaymentCollectionRouteResolver.php
          php -l app/Domain/Finance/Services/PaymentCollectionPostingVerifier.php
          php -l app/Domain/Finance/Services/PaymentCollectionReadinessAuditService.php
          php -l app/Domain/Finance/Services/PaymentCollectionMirrorService.php
          php -l app/Domain/Finance/Services/PaymentClearingAccountService.php
          php -l app/Console/Commands/AuditPaymentCollectionReadiness.php
          php -l tests/Feature/PaymentCollectionReadinessAuditTest.php
          php -l tests/Feature/PaymentCollectionReadinessBlockersTest.php

      - name: Run readiness audit tests
        run: php artisan test --filter=PaymentCollectionReadiness

      - name: Run collection mirror regression tests
        run: php artisan test --filter=PaymentCollectionMirrorTest

      - name: Run architecture guard
        run: php artisan finance:audit-core-architecture
