name: Financial Integration Contract Quality

on:
  pull_request:
    paths:
      - 'app/Domain/Finance/Contracts/**'
      - 'app/Domain/Finance/Data/**'
      - 'app/Domain/Finance/Adapters/**'
      - 'tests/Feature/FinancialLedgerGatewayTest.php'
      - '.github/workflows/financial-integration-contract-quality.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, bcmath, sqlite3, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Prepare test environment
        run: |
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/framework/testing storage/logs bootstrap/cache
          cp .env.example .env
          chmod -R 775 storage bootstrap/cache

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare application
        run: |
          php artisan key:generate
          php artisan optimize:clear

      - name: Validate PHP syntax
        run: |
          find app/Domain/Finance/Contracts app/Domain/Finance/Data app/Domain/Finance/Adapters -name '*.php' -print0 | xargs -0 -n1 php -l
          php -l tests/Feature/FinancialLedgerGatewayTest.php

      - name: Run contract tests
        run: php artisan test --filter=FinancialLedgerGatewayTest
