name: Frontend Quality

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install YAML parser
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-yaml

      - name: Verify GitHub-hosted toolchain
        run: |
          set -euo pipefail
          node --version | grep -Eq '^v20\.'
          npm --version
          python3 -c 'import yaml'

      - name: Validate deployment scripts
        run: |
          bash -n scripts/ci/verify_frontend_build.sh
          bash -n scripts/deploy/production.sh
          bash -n scripts/deploy/rollback.sh

      - name: Validate workflow YAML
        run: |
          python3 - <<'PY'
          import yaml
          for path in [
              '.github/workflows/ci.yml',
              '.github/workflows/deploy.yml',
              '.github/workflows/deploy-staging.yml',
              '.github/workflows/frontend-quality.yml',
          ]:
              with open(path, encoding='utf-8') as handle:
                  yaml.safe_load(handle)
              print(f'{path}: YAML valide')
          PY

      - name: Deterministic production build
        run: MIN_NODE_MAJOR=20 REQUIRE_EXACT_NODE_MAJOR=1 bash scripts/ci/verify_frontend_build.sh
