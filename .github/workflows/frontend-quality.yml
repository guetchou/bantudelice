name: Frontend Quality

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: [self-hosted, ci, isolated]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Verify isolated runner toolchain
        run: |
          set -euo pipefail
          node --version | grep -Eq '^v20\.'
          npm --version
          python3 -c 'import yaml'
          if sudo -n true 2>/dev/null; then
            echo 'Le runner CI ne doit pas disposer de sudo sans mot de passe.'
            exit 1
          fi

      - name: Validate deployment scripts
        run: |
          bash -n scripts/ci/verify_frontend_build.sh
          bash -n scripts/deploy/production.sh
          bash -n scripts/deploy/rollback.sh

      - name: Validate workflow YAML
        run: |
          python3 - <<'PY'
          import yaml
          for path in [
              '.github/workflows/ci.yml',
              '.github/workflows/deploy.yml',
              '.github/workflows/deploy-staging.yml',
              '.github/workflows/frontend-quality.yml',
          ]:
              with open(path, encoding='utf-8') as handle:
                  yaml.safe_load(handle)
              print(f'{path}: YAML valide')
          PY

      - name: Deterministic production build
        run: MIN_NODE_MAJOR=20 REQUIRE_EXACT_NODE_MAJOR=1 bash scripts/ci/verify_frontend_build.sh
