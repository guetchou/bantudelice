name: Apply permanent Mix 6 pipeline
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: chore/mix6-build-chain
          fetch-depth: 0
      - name: Replace temporary frontend guards
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path('.github/workflows/deploy.yml')
          text = path.read_text()

          quality_pattern = re.compile(
              r"      # Build npm DÉSACTIVÉ TEMPORAIREMENT.*?"
              r"      - name: 🔒 Vérifier que \.env n'est pas commité",
              re.S,
          )
          quality_replacement = """      - name: 📦 Setup Node 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: 🎨 npm ci + build frontend bloquant
        env:
          PUPPETEER_SKIP_DOWNLOAD: '1'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: |
          test \"$(node -p \"process.versions.node.split('.')[0]\")\" = \"20\"
          npm ci --ignore-scripts --no-audit --no-fund
          npm run production
          node --check public/js/app.js
          cmp --silent resources/css/app.css public/css/app.css
          grep -Fq \"../frontend/css/modern.css\" public/css/app.css
          git diff --exit-code -- public/js/app.js public/css/app.css public/mix-manifest.json

      - name: 🔒 Vérifier que .env n'est pas commité"""
          text, quality_count = quality_pattern.subn(quality_replacement, text, count=1)
          if quality_count != 1:
              raise SystemExit(f'quality gate block replacement count={quality_count}')

          deploy_pattern = re.compile(
              r"            # Build npm DÉSACTIVÉ TEMPORAIREMENT sur le serveur.*?"
              r"            # les sources frontend tant que ce chantier n'est pas réparé\.\n",
              re.S,
          )
          deploy_replacement = """            # Build frontend reproductible — les assets générés doivent rester
            # identiques à ceux validés et commités par le Quality Gate.
            echo \"🎨 Installing frontend dependencies and rebuilding assets...\"
            if ! command -v node >/dev/null 2>&1 || ! command -v npm >/dev/null 2>&1; then
              echo \"❌ Node.js/npm absents du serveur — déploiement annulé avant migrations.\"
              exit 1
            fi
            NODE_MAJOR=$(node -p \"process.versions.node.split('.')[0]\")
            if [ \"$NODE_MAJOR\" -lt 18 ]; then
              echo \"❌ Node.js 18+ requis, version détectée : $(node --version)\"
              exit 1
            fi
            export PUPPETEER_SKIP_DOWNLOAD=1
            export PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
            npm ci --ignore-scripts --no-audit --no-fund
            npm run production
            node --check public/js/app.js
            cmp --silent resources/css/app.css public/css/app.css
            if ! git diff --quiet -- public/js/app.js public/css/app.css public/mix-manifest.json; then
              echo \"❌ Build frontend non reproductible : les assets diffèrent du commit testé.\"
              git diff --stat -- public/js/app.js public/css/app.css public/mix-manifest.json
              exit 1
            fi
            echo \"✅ Build frontend reproductible avec Node $(node --version) / npm $(npm --version).\"
"""
          text, deploy_count = deploy_pattern.subn(deploy_replacement, text, count=1)
          if deploy_count != 1:
              raise SystemExit(f'deploy block replacement count={deploy_count}')

          path.write_text(text)
          PY
      - name: Validate applied controls
        run: |
          grep -Fq 'npm ci --ignore-scripts --no-audit --no-fund' .github/workflows/deploy.yml
          test "$(grep -Fc 'npm ci --ignore-scripts --no-audit --no-fund' .github/workflows/deploy.yml)" = "2"
          grep -Fq 'git diff --exit-code -- public/js/app.js public/css/app.css public/mix-manifest.json' .github/workflows/deploy.yml
          grep -Fq 'Build frontend non reproductible' .github/workflows/deploy.yml
          ! grep -Fq 'Build npm DÉSACTIVÉ TEMPORAIREMENT' .github/workflows/deploy.yml
          python3 -m pip install --quiet pyyaml
          python3 - <<'PY'
          import yaml
          with open('.github/workflows/deploy.yml', encoding='utf-8') as handle:
              yaml.safe_load(handle)
          print('YAML syntax OK')
          PY
      - name: Commit permanent pipeline update
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/deploy.yml
          git diff --cached --quiet && exit 0
          git commit -m 'ci(frontend): restore blocking npm build in CI and deploy'
          git push origin HEAD:chore/mix6-build-chain
