name: Apply Colis Realtime Fix
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: fix/realtime-geolocation-pipeline
          fetch-depth: 0
      - run: python3 scripts/ci/patch_colis_realtime.py
      - run: |
          grep -Fq "private-colis.shipment." resources/views/frontend/colis/show.blade.php
          grep -Fq "colis.shipment.presence.updated" resources/views/frontend/colis/show.blade.php
          grep -Fq "colis.shipment.status.updated" resources/views/frontend/colis/show.blade.php
      - run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add resources/views/frontend/colis/show.blade.php
          git commit -m 'fix(realtime): consume Colis presence and status events'
          git push origin HEAD:fix/realtime-geolocation-pipeline
