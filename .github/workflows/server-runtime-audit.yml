name: Production Runtime Audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  runtime:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      result: ${{ steps.runtime.outputs.result }}
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust production host
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - id: runtime
        name: Read Node and npm versions
        run: |
          RESULT=$(ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} 'printf "node="; node --version 2>/dev/null || printf "missing"; printf " npm="; npm --version 2>/dev/null || printf "missing"')
          echo "$RESULT"
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"
          NODE_MAJOR=$(ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} 'node -p "process.versions.node.split(\".\")[0]" 2>/dev/null || echo 0')
          test "$NODE_MAJOR" -ge 18

  report:
    needs: runtime
    name: ${{ needs.runtime.outputs.result }}
    runs-on: ubuntu-latest
    steps:
      - run: true
