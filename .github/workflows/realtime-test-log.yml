name: Realtime Test Log
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: shivammathur/setup-php@cf4cade2721270509d5b1c766ab3549210a39a2a
        with:
          php-version: '8.3'
          extensions: pdo, pdo_sqlite, mbstring, xml, ctype, json, tokenizer, bcmath, openssl, fileinfo
          coverage: none
      - run: |
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/framework/testing storage/logs
          printf '%s\n' 'APP_ENV=testing' 'APP_KEY=' 'APP_URL=http://localhost' 'DB_CONNECTION=sqlite' 'DB_DATABASE=:memory:' 'CACHE_DRIVER=array' 'SESSION_DRIVER=array' 'QUEUE_CONNECTION=sync' 'BROADCAST_DRIVER=log' > .env
          composer install --no-interaction --prefer-dist --optimize-autoloader --quiet
          php artisan key:generate --ansi
          php artisan passport:keys --force
      - name: Capture test output
        run: |
          php artisan test tests/Feature/RealtimeGeolocationPipelineTest.php --stop-on-failure > /tmp/realtime-test.log 2>&1 || true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: realtime-test-log
          path: /tmp/realtime-test.log
          retention-days: 7
