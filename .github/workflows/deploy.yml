name: 🚀 BantuDelice - Deploy to Production

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**'
      - '!.github/workflows/**'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests'
        required: false
        default: 'false'
        type: boolean
      skip_migrations:
        description: 'Skip database migrations'
        required: false
        default: 'false'
        type: boolean

env:
  PROJECT_NAME: bantudelice242
  PROJECT_PATH: /opt/bantudelice242

jobs:
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_tests != 'true'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo, pdo_pgsql, pgsql, mbstring, xml, ctype, json, tokenizer, bcmath, openssl, fileinfo
          coverage: none

      - name: 📦 Setup Composer
        uses: php-actions/composer@v6
        with:
          php_version: '8.1'

      - name: 📥 Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: 🔍 Copy .env
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          fi

      - name: 🔑 Generate application key
        run: php artisan key:generate --ansi || true

      - name: 🧪 Run tests
        run: php artisan test || echo "Tests skipped or failed"

  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: 🔑 Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: 🏗️ Build and Deploy
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'DEPLOY_SCRIPT'
            set -e
            
            PROJECT_PATH="/opt/bantudelice242"
            PROJECT_NAME="bantudelice242"
            
            echo "🚀 Starting deployment of $PROJECT_NAME..."
            
            # Backup current state
            echo "📦 Creating backup..."
            BACKUP_DIR="/opt/backups/bantudelice242/$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            
            if [ -d "$PROJECT_PATH" ]; then
              cd "$PROJECT_PATH"
              
              # Backup .env
              [ -f .env ] && cp .env "$BACKUP_DIR/.env.backup"
              
              # Backup database
              if docker ps | grep -q bantudelice.*postgres; then
                echo "💾 Backing up database..."
                DB_CONTAINER=$(docker ps | grep bantudelice.*postgres | awk '{print $1}' | head -1)
                if [ -n "$DB_CONTAINER" ]; then
                  docker exec "$DB_CONTAINER" pg_dump -U bantudelice bantudelice > "$BACKUP_DIR/database.sql" 2>/dev/null || \
                  echo "⚠️  Could not backup database"
                fi
              fi
            fi
            
            # Pull latest code
            echo "📥 Pulling latest code..."
            if [ -d "$PROJECT_PATH" ]; then
              cd "$PROJECT_PATH"
              
              # Check if git repo
              if [ -d .git ]; then
                git fetch origin
                CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "main")
                git reset --hard "origin/$CURRENT_BRANCH" || git reset --hard origin/main || git reset --hard origin/master
              else
                echo "⚠️  Not a git repository. Skipping git pull."
              fi
            else
              echo "❌ Project directory not found: $PROJECT_PATH"
              exit 1
            fi
            
            # Verify .env exists
            if [ ! -f "$PROJECT_PATH/.env" ]; then
              echo "⚠️  .env file not found. Please create it manually."
              if [ -f "$PROJECT_PATH/.env.example" ]; then
                echo "📋 Copying .env.example to .env"
                cp "$PROJECT_PATH/.env.example" "$PROJECT_PATH/.env"
                echo "⚠️  Please update .env with your configuration"
              fi
            fi
            
            # Install/Update dependencies
            echo "📦 Installing dependencies..."
            cd "$PROJECT_PATH"
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            
            # Clear and cache config
            echo "🧹 Clearing cache..."
            php artisan config:clear || true
            php artisan cache:clear || true
            php artisan route:clear || true
            php artisan view:clear || true
            
            # Run migrations (if not skipped)
            if [ "${{ github.event.inputs.skip_migrations }}" != "true" ]; then
              echo "🔄 Running migrations..."
              php artisan migrate --force || {
                echo "❌ Migration failed. Rolling back..."
                exit 1
              }
            else
              echo "⏭️  Skipping migrations (requested)"
            fi
            
            # Optimize Laravel
            echo "⚡ Optimizing Laravel..."
            php artisan config:cache || true
            php artisan route:cache || true
            php artisan view:cache || true
            
            # Restart PHP-FPM (if using TheDrop247 PHP container)
            echo "🔄 Restarting PHP-FPM..."
            if docker ps | grep -q thedrop247_php; then
              docker restart thedrop247_php || true
            fi
            
            # Verify compliance
            echo "🛡️  Verifying compliance..."
            /usr/local/bin/policy-check-ports.sh --strict || true
            /usr/local/bin/policy-check-proxy-net.sh --strict || true
            
            echo "✅ Deployment completed successfully!"
          DEPLOY_SCRIPT

      - name: ✅ Verify Deployment
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'VERIFY_SCRIPT'
            echo "🔍 Checking application status..."
            
            # Check if PHP-FPM is running
            if docker ps | grep -q thedrop247_php; then
              echo "✅ PHP-FPM container is running"
            else
              echo "⚠️  PHP-FPM container not found"
            fi
            
            # Test application endpoint
            echo "🌐 Testing application endpoint..."
            curl -I https://bantudelice.cg 2>&1 | head -5 || echo "⚠️  Could not reach application"
          VERIFY_SCRIPT

      - name: 🎉 Deployment Summary
        if: success()
        run: |
          echo "✅ BantuDelice deployed successfully!"
          echo "🌐 Application: https://bantudelice.cg"
          echo "📊 Check logs: ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} 'tail -f /opt/bantudelice242/storage/logs/laravel.log'"

      - name: ❌ Rollback on Failure
        if: failure()
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'ROLLBACK_SCRIPT'
            echo "❌ Deployment failed. Attempting rollback..."
            
            PROJECT_PATH="/opt/bantudelice242"
            LATEST_BACKUP=$(ls -td /opt/backups/bantudelice242/*/ 2>/dev/null | head -1)
            
            if [ -n "$LATEST_BACKUP" ] && [ -f "$LATEST_BACKUP/.env.backup" ]; then
              echo "📦 Restoring from backup: $LATEST_BACKUP"
              cd "$PROJECT_PATH"
              cp "$LATEST_BACKUP/.env.backup" .env
              
              # Restore database if backup exists
              if [ -f "$LATEST_BACKUP/database.sql" ]; then
                echo "💾 Restoring database..."
                DB_CONTAINER=$(docker ps | grep bantudelice.*postgres | awk '{print $1}' | head -1)
                if [ -n "$DB_CONTAINER" ]; then
                  docker exec -i "$DB_CONTAINER" psql -U bantudelice bantudelice < "$LATEST_BACKUP/database.sql" || true
                fi
              fi
              
              # Clear cache
              php artisan config:clear
              php artisan cache:clear
              
              echo "✅ Rollback completed"
            else
              echo "⚠️  No backup found. Manual intervention required."
            fi
          ROLLBACK_SCRIPT

