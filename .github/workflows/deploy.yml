name: BantuDelice - CI/CD Production

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  APP_URL: https://bantudelice.cg

jobs:
  quality_gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: 🧩 Vérifier les assets legacy du Dashboard Restaurant
        run: bash scripts/check_restaurant_legacy_assets.sh

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@cf4cade2721270509d5b1c766ab3549210a39a2a
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, mysqli, mbstring, xml, ctype, json, tokenizer, bcmath, openssl, fileinfo
          coverage: none

      - name: Validate Composer
        run: composer validate --strict

      - name: Prepare Laravel test environment
        run: |
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/framework/testing storage/logs
          chmod -R 775 storage
          cat > .env <<'ENVEOF'
          APP_NAME=BantuDelice
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=false
          APP_URL=http://localhost
          LOG_CHANNEL=stack
          DB_CONNECTION=sqlite
          DB_DATABASE=:memory:
          CACHE_DRIVER=array
          SESSION_DRIVER=array
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          BROADCAST_DRIVER=log
          REDIS_HOST=127.0.0.1
          REDIS_PORT=6379
          ENVEOF

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare application
        run: |
          php artisan key:generate --ansi
          php artisan passport:keys --force

      - name: PHP syntax
        run: find app config database routes tests -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Test suite
        run: php artisan test

      - name: Route and configuration checks
        run: |
          php artisan route:list > /dev/null
          php artisan config:cache
          php artisan config:clear

      - name: Setup Node 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'

      - name: Deterministic frontend build
        run: MIN_NODE_MAJOR=20 REQUIRE_EXACT_NODE_MAJOR=1 bash scripts/ci/verify_frontend_build.sh

      - name: Repository hygiene
        run: |
          ! git ls-files | grep -qx '.env'
          ! git ls-files | grep -q '^storage/'

      - name: Secret scan for this push
        run: |
          set -e
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            RANGE="${{ github.sha }}~1..${{ github.sha }}"
          else
            RANGE="$BEFORE..${{ github.sha }}"
          fi
          PATTERN='-----BEGIN (RSA|EC|OPENSSH|DSA|PGP) PRIVATE KEY-----|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{30,}|glpat-[A-Za-z0-9_-]{20,}|sk_live_[A-Za-z0-9]{20,}|AIza[0-9A-Za-z_-]{30,}'
          ! git diff "$RANGE" | grep -E "$PATTERN"

      - name: Keep order tracking protected
        run: |
          LINE=$(grep -n "track-order/{orderNo?}" routes/web.php || true)
          test -n "$LINE"
          echo "$LINE" | grep -q "'auth'"
          echo "$LINE" | grep -q "'module:food'"

  deploy:
    name: Deploy to Production
    needs: [quality_gate]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout deployment scripts
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup SSH
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust production host
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy verified commit
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            DEPLOY_SHA="${{ github.sha }}" \
            'bash -s' < scripts/deploy/production.sh

  smoke_test:
    name: Smoke Tests
    needs: [deploy]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust production host
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Public HTTP checks
        run: |
          test "$(curl -sS -o /dev/null -w '%{http_code}' "$APP_URL/")" = "200"
          test "$(curl -sS -o /dev/null -w '%{http_code}' "$APP_URL/login")" = "200"
          test "$(curl -sS -o /dev/null -w '%{http_code}' "$APP_URL/restaurants")" = "200"
          CHECKOUT_CODE=$(curl -sS -o /dev/null -w '%{http_code}' "$APP_URL/checkout")
          test "$CHECKOUT_CODE" -lt 500
          TRACK_CODE=$(curl -sS -o /dev/null -w '%{http_code}' "$APP_URL/track-order")
          test "$TRACK_CODE" = "301" -o "$TRACK_CODE" = "302"

      - name: API health
        run: |
          BODY=$(curl -sS "$APP_URL/api/health/modules")
          echo "$BODY"
          echo "$BODY" | grep -Eq '"status"[[:space:]]*:[[:space:]]*"ok"'

      - name: Recent production errors
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "tail -n 200 /opt/bantudelice/storage/logs/laravel.log 2>/dev/null | grep -c '\.ERROR:' || true"

  rollback:
    name: Rollback Code
    needs: [deploy, smoke_test]
    if: needs.deploy.result == 'failure' || needs.smoke_test.result == 'failure'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout rollback script
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup SSH
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust production host
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Restore previous code
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            DEPLOY_SHA="${{ github.sha }}" \
            'bash -s' < scripts/deploy/rollback.sh

      - name: Verify rollback
        run: test "$(curl -sS -o /dev/null -w '%{http_code}' "$APP_URL/")" = "200"

      - name: Preserve failed workflow status
        run: exit 1
