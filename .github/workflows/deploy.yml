name: BantuDelice CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality_gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@cf4cade2721270509d5b1c766ab3549210a39a2a
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, pdo_sqlite, sqlite3, mysqli, mbstring, xml, ctype, json, tokenizer, bcmath, openssl, fileinfo, intl
          coverage: none
          tools: composer:v2

      - name: Setup Node 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
          cache: npm

      - name: Validate deployment assets
        run: |
          bash -n scripts/ci/verify_frontend_build.sh
          bash -n scripts/deploy/production.sh
          bash -n scripts/deploy/rollback.sh
          python3 -m pip install --quiet pyyaml
          python3 - <<'PY'
          import pathlib
          import yaml

          paths = [
              '.github/workflows/deploy.yml',
              '.github/workflows/deploy-staging.yml',
              '.github/workflows/deploy-production.yml',
              '.github/workflows/rollback-production.yml',
              '.github/workflows/frontend-quality.yml',
          ]
          for path in paths:
              yaml.safe_load(pathlib.Path(path).read_text(encoding='utf-8'))
              print(f'{path}: YAML valide')
          PY

      - name: Validate Composer
        run: composer validate --strict

      - name: Prepare Laravel test environment
        run: |
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/framework/testing storage/logs
          chmod -R 775 storage
          cat > .env <<'ENVEOF'
          APP_NAME=BantuDelice
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=false
          APP_URL=http://localhost
          LOG_CHANNEL=stack
          DB_CONNECTION=sqlite
          DB_DATABASE=:memory:
          CACHE_DRIVER=array
          SESSION_DRIVER=array
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          BROADCAST_DRIVER=log
          REDIS_HOST=127.0.0.1
          REDIS_PORT=6379
          GEPAY_REQUIRE_NONCE=false
          ENVEOF

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare application
        run: |
          php artisan key:generate --ansi
          php artisan passport:keys --force
          php artisan optimize:clear

      - name: PHP syntax
        run: find app config database routes tests -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Database migrations
        run: |
          php artisan migrate:fresh --force
          php artisan migrate:status

      - name: Test suite
        run: php artisan test

      - name: Route, schedule and configuration checks
        run: |
          php artisan route:list > /dev/null
          php artisan schedule:list > /dev/null
          php artisan config:cache
          php artisan config:clear

      - name: Restaurant legacy assets guard
        run: bash scripts/check_restaurant_legacy_assets.sh

      - name: Deterministic frontend build
        run: MIN_NODE_MAJOR=20 REQUIRE_EXACT_NODE_MAJOR=1 bash scripts/ci/verify_frontend_build.sh

      - name: Repository hygiene
        run: |
          ! git ls-files | grep -qx '.env'
          ! git ls-files | grep -q '^storage/'

      - name: Secret scan for changed commits
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          elif [ -n "${{ github.event.before || '' }}" ] && [ "${{ github.event.before || '' }}" != "0000000000000000000000000000000000000000" ]; then
            RANGE="${{ github.event.before }}..${{ github.sha }}"
          else
            RANGE="${{ github.sha }}~1..${{ github.sha }}"
          fi

          PATTERN='-----BEGIN (RSA|EC|OPENSSH|DSA|PGP) PRIVATE KEY-----|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{30,}|glpat-[A-Za-z0-9_-]{20,}|sk_live_[A-Za-z0-9]{20,}|AIza[0-9A-Za-z_-]{30,}'
          ! git diff "$RANGE" | grep -E "$PATTERN"

      - name: Keep order tracking protected
        run: |
          LINE=$(grep -n "track-order/{orderNo?}" routes/web.php || true)
          test -n "$LINE"
          echo "$LINE" | grep -q "'auth'"
          echo "$LINE" | grep -q "'module:food'"

      - name: Record verified commit
        run: echo "VERIFIED_SHA=${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
