name: Apply Driver Tracking Runtime
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: fix/realtime-geolocation-pipeline
          fetch-depth: 0
      - run: python3 scripts/ci/patch_driver_tracking_runtime.py
      - run: |
          grep -Fq "_heartbeatTimer" resources/views/driver/deliveries.blade.php
          grep -Fq "txLocationInFlight" resources/views/driver/transport/index.blade.php
          grep -Fq "recorded_at: new Date" resources/views/driver/transport/index.blade.php
      - run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add resources/views/driver/deliveries.blade.php resources/views/driver/transport/index.blade.php
          git commit -m 'fix(realtime): harden driver GPS update loops'
          git push origin HEAD:fix/realtime-geolocation-pipeline
