name: Branch tests
on: [push, pull_request]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: shivammathur/setup-php@cf4cade2721270509d5b1c766ab3549210a39a2a
        with:
          php-version: '8.3'
          extensions: pdo, pdo_sqlite, mbstring, xml, ctype, json, tokenizer, bcmath, openssl, fileinfo
          coverage: none
      - run: composer validate --strict
      - run: mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/framework/testing storage/logs
      - run: printf '%s\n' 'APP_ENV=testing' 'APP_KEY=' 'APP_URL=http://localhost' 'DB_CONNECTION=sqlite' 'DB_DATABASE=:memory:' 'CACHE_DRIVER=array' 'SESSION_DRIVER=array' 'QUEUE_CONNECTION=sync' 'MAIL_MAILER=array' 'BROADCAST_DRIVER=log' > .env
      - run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - run: php artisan key:generate --ansi && php artisan passport:keys --force
      - run: find app config database routes tests -name '*.php' -print0 | xargs -0 -n1 php -l
      - run: php artisan test
      - run: php artisan route:list > /dev/null
