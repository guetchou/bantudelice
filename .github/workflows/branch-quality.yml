name: BantuDelice - Branch Quality Gate

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: branch-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality_gate:
    name: Branch Quality Gate
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@cf4cade2721270509d5b1c766ab3549210a39a2a
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, mysqli, mbstring, xml, ctype, json, tokenizer, bcmath, openssl, fileinfo
          coverage: none

      - name: Validate Composer
        run: composer validate --strict

      - name: Prepare Laravel directories and environment
        run: |
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/framework/testing storage/logs
          chmod -R 775 storage
          cat > .env <<'ENVEOF'
          APP_NAME=BantuDelice
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=false
          APP_URL=http://localhost
          LOG_CHANNEL=stack
          DB_CONNECTION=sqlite
          DB_DATABASE=:memory:
          CACHE_DRIVER=array
          SESSION_DRIVER=array
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          BROADCAST_DRIVER=log
          REDIS_HOST=127.0.0.1
          REDIS_PORT=6379
          ENVEOF

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare application
        run: |
          php artisan key:generate --ansi
          php artisan passport:keys --force

      - name: PHP syntax
        run: find app config database routes tests -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Test suite
        run: php artisan test

      - name: Route and configuration checks
        run: |
          php artisan route:list > /dev/null
          php artisan config:cache
          php artisan config:clear

      - name: Repository hygiene
        run: |
          ! git ls-files | grep -qx '.env'
          ! git ls-files | grep -q '^storage/'

      - name: Block unverified frontend source changes
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- resources/js resources/sass webpack.mix.js package.json package-lock.json)
          if [ -n "$CHANGED" ]; then
            echo "$CHANGED"
            exit 1
          fi
