name: Branch Quality Gate
on: [push, pull_request]
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.check.outputs.result }}
      code: ${{ steps.check.outputs.code }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: shivammathur/setup-php@cf4cade2721270509d5b1c766ab3549210a39a2a
        with:
          php-version: '8.3'
          extensions: pdo, pdo_sqlite, mbstring, xml, ctype, json, tokenizer, bcmath, openssl, fileinfo
          coverage: none
      - run: mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/framework/testing storage/logs
      - run: printf '%s\n' 'APP_ENV=testing' 'APP_KEY=' 'APP_URL=http://localhost' 'DB_CONNECTION=sqlite' 'DB_DATABASE=:memory:' 'CACHE_DRIVER=array' 'SESSION_DRIVER=array' 'QUEUE_CONNECTION=sync' 'MAIL_MAILER=array' 'BROADCAST_DRIVER=log' > .env
      - run: composer install --no-interaction --prefer-dist --optimize-autoloader --quiet
      - run: php artisan key:generate --ansi && php artisan passport:keys --force
      - id: check
        run: |
          set +e
          bash ci/targeted-check.sh > /tmp/r 2>&1
          C=$?
          L=$(tail -n 8 /tmp/r | tr '\r\n' ' ' | tr -s ' ' | cut -c1-180)
          echo "result=$L" >> "$GITHUB_OUTPUT"
          echo "code=$C" >> "$GITHUB_OUTPUT"
          exit 0
  report:
    needs: diagnose
    name: ${{ needs.diagnose.outputs.result }}
    runs-on: ubuntu-latest
    steps:
      - run: test "${{ needs.diagnose.outputs.code }}" = "0"
